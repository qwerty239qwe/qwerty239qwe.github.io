name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure base path for project sites
        id: basepath
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY%%/*}"
          USER_SITE="${OWNER}.github.io"
          if [ "$REPO_NAME" = "$USER_SITE" ]; then
            echo "value=" >> "$GITHUB_OUTPUT"
          else
            echo "value=/$REPO_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Install
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.basepath.outputs.value }}
          NEXT_PUBLIC_BLOG_ENABLED: ${{ vars.NEXT_PUBLIC_BLOG_ENABLED || 'false' }}
          PEPY_API_KEY: ${{ secrets.PEPY_API_KEY }}
        run: npm run build

      - name: Disable Jekyll on Pages
        run: touch out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
